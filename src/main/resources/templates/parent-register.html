<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保護者アカウント登録</title>
<link rel="stylesheet" th:href="@{/css/parent-register.css}">
</head>
<body>
<main class="page">
  <section class="container">

    <a class="back-link" th:href="@{/parent/login}">← 保護者ログインへ</a>

    <div class="register-header">
      <div class="register-icon">👤</div>
      <h1>保護者アカウント登録</h1>
    </div>

    <form class="register-card" th:action="@{/register/parent}" th:object="${userForm}" method="post">

      <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

      <label for="userName">ユーザー名</label>
      <input id="userName" type="text" th:field="*{userName}" placeholder="お名前">
      <p class="field-error" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></p>

      <label for="mailAddress">メールアドレス</label>
      <input id="mailAddress" type="email" th:field="*{mailAddress}" placeholder="example@email.com">
      <p class="field-error" th:if="${#fields.hasErrors('mailAddress')}" th:errors="*{mailAddress}"></p>

      <label for="password">パスワード</label>
      <input id="password" type="password" th:field="*{password}" placeholder="パスワード">
      <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

      <label for="passwordConfirm">パスワード（確認）</label>
      <input id="passwordConfirm" type="password" th:field="*{passwordConfirm}" placeholder="もう一度入力">
      <p class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>

      <button id="btnRegister" type="submit">登録する</button>
    </form>

  </section>
</main>

<script th:src="@{/js/parent-register.js}"></script>
</body>
</html>
