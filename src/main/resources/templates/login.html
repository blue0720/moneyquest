<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<main class="page">
  <section class="container">

	<a id="backLink" class="back-link" th:href="@{/}">← 戻る</a>

    <div class="login-header">
      <div id="loginIcon" class="login-icon">🌸</div>
      <h1 id="loginTitle">こどもログイン</h1>
      <p id="adminSubTitle" class="admin-sub-title">システム管理者専用ページ</p>
    </div>

    <form class="login-card" th:action="@{/login}" method="post">
      <div th:if="${param.error}" class="error-message">
        メールアドレスまたはパスワードが違います
      </div>

      <label for="mailAddress">メールアドレス</label>
      <input id="mailAddress" type="email" name="mailAddress" placeholder="example@email.com" required>

      <label for="password">パスワード</label>
      <input id="password" type="password" name="password" placeholder="パスワード" required>

	  <button id="btnLogin" type="submit">ログイン</button>

      <a id="registerLink" class="register-link" th:href="@{/register/parent}">
        新規登録はこちら →
      </a>
    </form>
  </section>
</main>

<script th:src="@{/js/login.js}"></script>

</body>
</html>
